spring.application.name=${SPRING_APPLICATION_NAME:Taxol760}
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taxol760}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:taxol760}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:taxol760}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=${SPRING_JPA_OPEN_IN_VIEW:false}

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

jwt.secret=${JWT_SECRET:taxol760-development-secret-key-change-this-value}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
